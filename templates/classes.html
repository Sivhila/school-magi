{% extends "layout.html" %}

{% block content %}

<h3>Classes</h3>

<form method="POST">
	<input type="text" name="name" class="form-control" placeholder="Class name (e.g Grade 10)" required>

	<br>

	<button class="btn btn-primary">
		Add Class
	</button>

</form>

<hr>

<table class="table table-bordered">
	<tr>
		<th>ID</th>
		<th>Class Name</th>
	</tr>

	{% for c in classes %}
	<tr>
		<td>{{ c.id }}</td>
		<td>{{ c.name }}</td>
	</tr>
	{% endfor %}

</table>

{% endblock %}
