{% extends "layout.html" %}

{% block content %}

<h3>Class Materials</h3>

<table class="table table-bordered">
	<tr>
		<th>Title</th>
		<th>Download</th>
	</tr>

	{% for m in materials %}
	<tr>
		<td>{{ m.title }}</td>
		<td>
			<a href="/{{ m.file_path }}" class="btn btn-success">
				Download
			</a>
		</td>
	</tr>
	{% endfor %}
	
</table>

{% endblock %}
