{% extends "layout.html" %}

{% block content %}

<h3>Students</h3>

<a href="/students/register" class="btn btn-primary mb-3">
	Add Student
</a>

<table class="table table-boardered">
	<tr>
		<th>Admission</th>
		<th>Name</th>
		<th>Class</th>
		<th>Parent Phone</th>
	</tr>

	{% for s in students %}
	<tr>
		<td>{{ s.admission_no }}</td>
		<td>{{ s.full_name }}</td>
		<td>{{ s.school_class.name }}</td>
		<td>{{ s.parent_phone }}</td>
	</tr>
	{% endfor %}

</table>

{% endblock %}
