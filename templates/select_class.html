{% extends "layout.html" %}

{% block content %}

<h3>Select Class</h3>

<form method="POST">
	<select name="class_id" class="form-control">

		{% for c in class %}
		<option value="{{ c.id }}">
		{{ c.name }}
		</option>
		{% endfor %}

	</select>

	<br>

	<button class="btn btn-primary">
		Mark Attendance
	</button>

</form>

{% endblock %}
